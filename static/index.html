<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pelemelo</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <nav class="topbar">
      <h1>Pelemelo</h1>
      <button id="btn-add-project" class="btn btn-sm">+ Project</button>
    </nav>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>Projects</h3>
          <ul id="project-list"></ul>
        </div>
      </aside>

      <!-- Main kanban area -->
      <main class="kanban">
        <div class="kanban-header" id="kanban-header">
          <h2 id="project-title">Select a project</h2>
          <button id="btn-add-task" class="btn btn-sm" style="display:none;">+ Task</button>
        </div>
        <div class="columns" id="kanban-columns" style="display:none;">
          <div class="column" data-status="todo">
            <div class="column-header">Todo</div>
            <div class="column-body" id="col-todo"></div>
          </div>
          <div class="column" data-status="doing">
            <div class="column-header">Doing</div>
            <div class="column-body" id="col-doing"></div>
          </div>
          <div class="column" data-status="done">
            <div class="column-header">Done</div>
            <div class="column-body" id="col-done"></div>
          </div>
        </div>
        <!-- Trash zone -->
        <div class="trash-zone" id="trash-zone">
          <span class="trash-icon">&#128465;</span>
          <span class="trash-label">Drop here to delete</span>
        </div>
      </main>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-add-project" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>New Project</h3>
      <input id="project-name" placeholder="Project name" required>
      <input id="project-webhook" placeholder="Discord webhook URL (optional)">
      <div class="modal-actions">
        <button class="btn" onclick="addProject()">Create</button>
        <button class="btn btn-cancel" onclick="closeModal('modal-add-project')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="modal-add-task" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>New Task</h3>
      <input id="task-title" placeholder="Task title" required>
      <textarea id="task-desc" placeholder="Description (optional)"></textarea>
      <input id="task-deadline" type="date" placeholder="Deadline (optional)">
      <div class="modal-actions">
        <button class="btn" onclick="addTask()">Create</button>
        <button class="btn btn-cancel" onclick="closeModal('modal-add-task')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="modal-edit-task" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Edit Task</h3>
      <input id="edit-task-title" placeholder="Task title">
      <textarea id="edit-task-desc" placeholder="Description (optional)"></textarea>
      <input id="edit-task-deadline" type="date" placeholder="Deadline (optional)">
      <div class="modal-actions">
        <button class="btn" onclick="saveEditTask()">Save</button>
        <button class="btn btn-cancel" onclick="closeModal('modal-edit-task')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="modal-edit-project" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Edit Project</h3>
      <input id="edit-project-name" placeholder="Project name">
      <input id="edit-project-webhook" placeholder="Discord webhook URL (optional)">
      <div class="modal-actions">
        <button class="btn" onclick="saveEditProject()">Save</button>
        <button class="btn btn-cancel" onclick="closeModal('modal-edit-project')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Mic / STT button (appears on task input) -->
  <button id="btn-mic" class="btn-mic" style="display:none;" title="Speak to add task title">
    &#127908;
  </button>

  <script src="/static/app.js"></script>
</body>
</html>
